<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  body { width: 340px; padding: 16px; font-family: 'Segoe UI', sans-serif; font-size: 13px; margin: 0; }
  h2 { margin: 0 0 4px; font-size: 16px; color: #0078d4; }
  .version { font-size: 11px; color: #999; margin-bottom: 10px; }
  .row { margin-bottom: 10px; }
  label { font-weight: 600; }
  select, input { padding: 4px 8px; border: 1px solid #ccc; border-radius: 4px; }
  button { padding: 8px 14px; border: none; border-radius: 4px; cursor: pointer; font-size: 13px; margin-right: 6px; margin-bottom: 6px; }
  #startBtn { background: #0078d4; color: white; }
  #startBtn:hover { background: #106ebe; }
  #startBtn:disabled { background: #999; cursor: not-allowed; }
  #stopBtn { background: #d13438; color: white; }
  #stopBtn:hover { background: #a52a2a; }
  #debugBtn { background: #edebe9; color: #333; }
  #debugBtn:hover { background: #ddd; }
  #status { margin-top: 10px; font-size: 12px; color: #333; max-height: 250px; overflow-y: auto; }
  .log-entry { padding: 2px 0; border-bottom: 1px solid #f0f0f0; }
  .log-entry.success { color: #107c10; }
  .log-entry.error { color: #d13438; }
  .log-entry.info { color: #0078d4; }
  .log-entry.warn { color: #ca5010; }
  .progress { width: 100%; height: 4px; background: #eee; border-radius: 2px; margin: 8px 0; }
  .progress-bar { height: 100%; background: #0078d4; border-radius: 2px; width: 0%; transition: width 0.3s; }
</style>
</head>
<body>
  <h2>OneNote Export</h2>
  <div class="version" id="version"></div>
  <div class="row">
    <label>Format: </label>
    <select id="format">
      <option value="pdf">PDF</option>
      <option value="html">HTML</option>
    </select>
  </div>
  <div class="row">
    <label>Delay: </label>
    <input id="delay" type="number" value="4000" min="1000" step="500" style="width:60px"> ms
  </div>
  <div>
    <button id="startBtn">Start Export</button>
    <button id="stopBtn">Stop</button>
    <button id="debugBtn">Debug</button>
    <button id="deepScanBtn">Deep Scan</button>
  </div>
  <div class="progress"><div class="progress-bar" id="progressBar"></div></div>
  <div id="status"></div>
  <script src="popup.js"></script>
</body>
</html>
